name: Generate Arcade Graphs

on:
  # Run automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate on pushes to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # 1) Pac-Man contribution graph -> dist/pacman-contribution-graph*.svg
      - name: Generate Pac-Man graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # Stash Pac-Man SVGs so the next generator can't wipe them
      - name: Stage Pac-Man SVGs
        run: |
          mkdir -p output
          cp -f dist/*.svg output/ 2>/dev/null || true

      # 2) Snake animation -> dist/snake*.svg
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Stage snake SVGs
        run: cp -f dist/snake*.svg output/

      # 3) Publish every SVG to the output branch in one shot
      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
